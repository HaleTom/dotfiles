# https://yazi-rs.github.io/docs/configuration/keymap/

# % placeholders:
# https://yazi-rs.github.io/docs/configuration/keymap/#manager.shell:~:text=You%20can%20use%20the%20following%20formatting%20parameters%20in%20%5Btemplate%5D%3A
# Non-documented:
# https://github.com/sxyazi/yazi/blob/main/yazi-fs/src/splatter.rs#L76

# In each layer, there are two attributes: prepend_keymap and append_keymap. Prepend inserts before the default keybindings, while append inserts after them.
#
# [mgr] - File list.
# [tasks] - Task manager.
# [spot] - File information spotter.
# [pick] - Pick component. e.g. "open with" for files.
# [input] - Input component. e.g. create, rename, etc.
# [confirm] - Confirmation dialog. e.g. remove, overwrite, etc.
# [cmp] - Completion component. e.g. "cd" URL completion.
# [help] - Help menu.

###### Single keys

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin --sync smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "<F5>"
run = "cd ."
desc = "Refresh directory listing"

[[mgr.prepend_keymap]]
on = "<Up>"
run = "plugin --sync smart-arrow-wrap -- up"
desc = "Move up, wrapping only on tap at top"

[[mgr.prepend_keymap]]
on = "k"
run = "plugin --sync smart-arrow-wrap -- up"
desc = "Move up, wrapping only on tap at top"

[[mgr.prepend_keymap]]
on = "<Down>"
run = "plugin --sync smart-arrow-wrap -- down"
desc = "Move down, wrapping only on tap at bottom"

[[mgr.prepend_keymap]]
on = "j"
run = "plugin --sync smart-arrow-wrap -- down"
desc = "Move down, wrapping only on tap at bottom"

[[mgr.prepend_keymap]]
on = "<F9>"
run = "plugin mediainfo -- toggle-metadata"
desc = "Toggle media preview metadata"

###### Chords

# Absolute pathname
[[mgr.prepend_keymap]]
on = [ "c", "a" ]
run = '''shell --block -- printf '%%s' %h | pbcopy'''
desc = "Copy hovered Absolute (logical) path"

# Canonical path
[[mgr.prepend_keymap]]
on = [ "c", "c" ]
run = '''shell --block -- realpath -- %h | pbcopy'''
desc = "Copy hovered Canonical path"
