# ~/.config/mise/config.toml
# https://mise.jdx.dev/configuration.html#global-config-config-mise-config-toml

# These are hidden from logs
# BUT STILL SHOWN by `mise env`
#
# To show ONLY these:
# mise env --redactions
redactions = [
    # https://www.perplexity.ai/search/give-a-very-full-list-of-redac-sbR5JNW4SKujfa7jSoIbig

    # ── Tier 1: Universal stem globs ─────────────────────────────────────
    # These alone cover ~85% of all cases. Order matters for readability only.
    "*SECRET*",           # CLIENT_SECRET, JWT_SECRET, WEBHOOK_SECRET, SECRET_KEY_BASE...
    "*TOKEN*",            # ACCESS_TOKEN, BEARER_TOKEN, GITHUB_TOKEN, VAULT_TOKEN...
    "*PASSWORD*",         # DB_PASSWORD, MYSQL_PASSWORD, SMTP_PASSWORD...
    "*PASSWD*",           # PASSWD, DB_PASSWD (different stem from PASSWORD)
    "*PASSPHRASE*",       # GPG_PASSPHRASE, SSH_PASSPHRASE
    "*CREDENTIAL*",       # CREDENTIALS, CREDENTIAL_FILE (subsumes *CREDENTIALS*)
    "*PRIVATE_KEY*",      # RSA_PRIVATE_KEY, SSH_PRIVATE_KEY, PGP_PRIVATE_KEY
    "*CONNECTION_STRING*",# AZURE_STORAGE_CONNECTION_STRING, DB_CONNECTION_STRING
    "*_PWD",              # DB_PWD, LDAP_PWD (short-form passwords)

    # ── Tier 2: KEY patterns (split to avoid *KEY* false positives) ───────
    "*_KEY",              # API_KEY, SECRET_KEY, STRIPE_SECRET_KEY (suffix)
    "*_KEY_*",            # AWS_ACCESS_KEY_ID, HMAC_KEY_VERSION (KEY in middle)
    "*APIKEY*",           # APIKEY, MY_APIKEY (no underscore variant)

    # ── Tier 3: Explicit entries not caught by Tier 1/2 ──────────────────
    # Only entries where NO stem glob above would match:
    "AWS_ACCESS_KEY_ID",              # ends in _ID, not _KEY
    "GOOGLE_APPLICATION_CREDENTIALS", # no SECRET/TOKEN/KEY/PASSWORD stem
    "KUBECONFIG",                     # no standard stem
    "SENTRY_DSN",                     # DSN contains embedded secret
    "CLOUDINARY_URL",                 # URI with embedded credentials
    "MONGODB_URI",                    # URI with embedded credentials
    "DATABASE_URL",                   # URI with embedded credentials
    "*_URI",                          # catch-all for credential-bearing URIs
    "*_DSN",                          # Data Source Names (embed credentials)
    "*_PEM",                          # PEM certificate files
    "*_P12",                          # PKCS12 keystores
    "*_PFX",                          # PFX keystores
    "CREDS",                          # shorthand, not caught by *CREDENTIAL*
    "*_CREDS",
    "*_SALT",                         # cryptographic salts
    "*_HASH",                         # password hashes

    # ── Tier 4: App framework specifics (no stem match) ──────────────────
    "SECRET_KEY_BASE",    # Rails — caught by *SECRET* ✓ (redundant, shown for clarity)
    # Only list here if you want an ALLOWLIST exception audit trail.
]


[settings]

# uv (python)
# 2025-05-24: disabled this as the experimental flag is required
#   and I don't know what else that will affect
# See upnote on "mise" for other per-project options (or even global!)
# https://mise.jdx.dev/mise-cookbook/python.html#mise-uv
# experimental = true
# python.uv_venv_auto = true
# Env var $MISE_PYTHON_UV_VENV_AUTO does the same thing:
# https://mise.jdx.dev/lang/python.html#python.uv_venv_auto

# 2025-05-24 disable warning caused by breaking change:
# https://github.com/jdx/mise/discussions/4345
idiomatic_version_file_enable_tools = []

# Shell variable expansion
# https://mise.jdx.dev/environments/#shell-style-variable-expansion
# Will become default in 2026.7.0 release
env_shell_expand = true
experimental = true

[tools]
rust = "latest"

[env]
MISE_ENV_DIR = "{{env.HOME}}/etc/secure/env/"

# Remove the above??
[vars]
keys = "{{env.HOME}}/etc/secure/env/"

##########
# Tasks
##########

# `run =` semantics
# Command after `sh -c -o errexit`  # MISE_DEBUG=1
# Command will have properly-quoted command-line arguments appended to them
# Example:  run = '''shell-quote 'opencode' "$@"  '''

# _.file
# ~~~~~~
# Missing files are silently ignored at 2026-04-13.  Not sure about source.

# Claude Code
[tasks.claude]
run = "/usr/bin/claude"
# run = "/bin/bash"

[tasks.claude.env]
_.file = "{{env.MISE_ENV_DIR}}/LITELLM_MASTER_KEY"
ANTHROPIC_BASE_URL="http://localhost:4000"
ANTHROPIC_AUTH_TOKEN = "{{env.LITELLM_MASTER_KEY}}"
CLAUDE_CONFIG_DIR = "{{env.HOME}}/config/claude/"


# LiteLLM Server
[tasks.litellm]
run = '''/bin/bash -xc -- "/usr/bin/litellm --config ~/.config/litellm/\"${LITELLM_CONFIG%.yaml}\".yaml --port 4000 --host 127.0.0.1 --detailed_debug"'''

[tasks.litellm.env]
LITELLM_CONFIG = "claude-baseten"
LITELLM_PROXY_URL = "http://localhost:4000"
_.file = [
  '{{vars.keys}}/LITELLM_MASTER_KEY',
  '{{vars.keys}}/NVIDIA_NIM_API_KEY',
  '{{vars.keys}}/BASETEN_GLM5_KEY',
]


# LiteLLM Proxy
[tasks.litellm-proxy]
run="/usr/bin/litellm-proxy"

[tasks.litellm-proxy.env]
_.file = "{{env.MISE_ENV_DIR}}/LITELLM_MASTER_KEY"
LITELLM_PROXY_API_KEY = "{{env.LITELLM_MASTER_KEY}}"
LITELLM_PROXY_URL = "http://localhost:4000"

[tasks.test]
run = '''set | grep TEST'''

[tasks.test.env]
  _.file = [
    '/tmp/test.env'
  ]
  TEST_explicit='loaded'


[tasks.aicode]
# run = '''/bin/bash -c -- '{{env.HOME}}/bin/opencode "$@"' '''
# run = '''set | grep -E 'KEY|TOKEN|API';  "$@" '''
run = '''set | grep -E 'KEY|TOKEN|API';  '''
# run = '''mise env'''
quiet = true  # Suppress mise's extra output.  https://mise.jdx.dev/tasks/task-configuration.html#quiet
raw = true  # Don't redact variables or mess with terminal

[tasks.aicode.env]
_.file = [
  '{{vars.keys}}/GEMINI_API_KEY',
  '{{vars.keys}}/GITHUB_PAT',
  '{{vars.keys}}/KILOCODE_API_KEY',
  '{{vars.keys}}/LINKUP_API_KEY',
  '{{vars.keys}}/NEURALWATT_API_KEY',
  '{{vars.keys}}/OPENADAPTER_API_KEY',
  '{{vars.keys}}/OPENCODE_API_KEY',
  '{{vars.keys}}/OLLAMA_API_KEY',
  '{{vars.keys}}/PERPLEXITY_API_KEY',
  '{{vars.keys}}/TAVILY_API_KEY-Coding',
  ## TODO FIXME: delete after PAT working:
  '{{vars.keys}}/GH_CLASSIC_TMP_KEY',
]

# tmuxai
[tasks.tmuxai]
run="/usr/bin/tmuxai"
# run="bash"  # debug env

[tasks.tmuxai.env]
_.file = [
    "{{vars.keys}}/GEMINI_API_KEY",
    "{{env.MISE_ENV_DIR}}/LITELLM_MASTER_KEY",
    "$MISE_ENV_DIR/OPENROUTER_API_KEY"
]
