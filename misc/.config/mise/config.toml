# GEMINI_API_KEY        = "{{env.GEMINI_API_KEY}}"
# LITELLM_MASTER_KEY    = "{{env.LITELLM_MASTER_KEY}}"
# LITELLM_PROXY_URL     = "http://localhost:4000"


