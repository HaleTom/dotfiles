# https://github.com/aome510/spotify-player/blob/master/docs/config.md
cover_img_length = 16
cover_img_width = 8
cover_img_scale = 1.0  # 2026-05-18: this uses the correct # of char cells with kitty graphics, but sixel looks small...
# Enable degrading image to look pixelated, set to high value to avoid
cover_img_pixels = 512  # Pixels per side (requires pixelate feature)

# Defaults:
theme = "dracula"
client_id = "d420a117a32841c2b3474932e49fb54b"
client_port = 8080
login_redirect_uri = "http://127.0.0.1:8989/login"
playback_format = """
{status} {track} • {artists} {liked}
{album} • {genres}
{metadata}"""
playback_metadata_fields = [
    "repeat",
    "shuffle",
    "volume",
    "device",
]
notify_timeout_in_secs = 0
notify_transient = false
tracks_playback_limit = 50
app_refresh_duration_in_ms = 32
playback_refresh_duration_in_ms = 0
page_size_in_rows = 20
play_icon = "▶"
pause_icon = "▌▌"
liked_icon = "♥"
explicit_icon = "(E)"
border_type = "Plain"
progress_bar_type = "Rectangle"
progress_bar_position = "Bottom"
genre_num = 2
enable_media_control = true
enable_streaming = "Always"
enable_audio_visualization = false
enable_notify = true
enable_cover_image_cache = true
default_device = "spotify-player"
notify_streaming_only = false
seek_duration_secs = 5
sort_artist_albums_by_type = false
volume_scroll_step = 5
enable_mouse_scroll_volume = true

[notify_format]
summary = "{track} • {artists}"
body = "{album}"

[layout]
playback_window_position = "Top"
playback_window_height = 6

[layout.library]
playlist_percent = 40
album_percent = 40

[device]
name = "spotify-player"
device_type = "speaker"
volume = 70
bitrate = 320
audio_cache = false
normalization = false
autoplay = false
